<!DOCTYPE html>
<html>
<head>
  <title>Dave Raskin</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.96.1/css/materialize.min.css">
  <link rel="stylesheet" href="https://ajax.googleapis.com/ajax/libs/angular_material/0.9.4/angular-material.min.css">
  <link rel="stylesheet" href="css/animate.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href='https://cdnjs.cloudflare.com/ajax/libs/animate.css/3.3.0/animate.min.css'>
  <link href="http://fonts.googleapis.com/css?family=Martel+Sans:300,400" rel="stylesheet" type="text/css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.3.15/angular.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angular_material/0.9.0/angular-material.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.3.15/angular-aria.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.3.15/angular-route.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular-local-storage/0.2.1/angular-local-storage.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/angular.js/1.3.15/angular-animate.js"></script>
  <script src="scripts/app.js"></script>
</head>
<body ng-app="angular" ng-controller="mainController">
<header class="page-header">
 <nav ng-if="currentPage != 'home'">
    <div class="nav-wrapper deep-orange darken-4">
      <a href="#!/" ng-click="changePage('home')" class="brand-logo">Dave Raskin</a>
      <ul id="nav-mobile" class="right hide-on-med-and-down">
        <li ng-class="activeView('about')"><a ng-click="changePage('about')" href="#!/about">About Me</a></li>
        <li ng-class="activeView('projects')"><a ng-click="changePage('projects')" href="#!/projects">Projects</a></li>
        <li ng-class="activeView('contact')"><a ng-click="openDialog()" href="#!/contact">Contact</a></li>
      </ul>
    </div>
  </nav>
</header>
<main class="page-main">
  <div ng-view></div>
</main>
  <footer class="page-footer deep-orange darken-4">
     <div class="footer-copyright center-align deep-orange darken-4">
    &copy; 2015 Dave Raskin.  Cover Photograph by <a id="sutula" href="https://vimeo.com/user5456346">Alex Sutula.</a>
      </div>
  </footer>
  <script type="text/javascript">
  var angularApp = angular.module('angular', ['ngAnimate', 'ngRoute', 'LocalStorageModule', 'ngMaterial'])

angularApp.config(['$routeProvider', '$locationProvider', function($routeProvider, $locationProvider){

    $routeProvider
    .when('/', {
        templateUrl: 'views/home.html',
        controller: "homeController"
    })
    .when('/about', {
        templateUrl: "views/about.html",
        controller: "mainController"
    })
    .when('/projects', {
        templateUrl: "views/projects.html",
        controller: "mainController"
    })
    .when('/contact', {
        templateUrl: "views/contact.html"
    })
    .otherwise('/404', {
        templateUrl: 'views/404.html'
    })

    $locationProvider.hashPrefix('!')

}])
.config(['localStorageServiceProvider', function(localStorageServiceProvider){
    localStorageServiceProvider.setPrefix('localStorage')
}])

angularApp.controller('homeController', ['$scope', 'localStorageService', function($scope, localStorageService){
    localStorageService.set('view', 'home');
    $scope.currentPage = localStorageService.get('view')

}])

angularApp.controller('mainController', ['$scope', '$routeParams', 'localStorageService', '$mdBottomSheet', '$mdDialog', function($scope, $routeParams, localStorageService, $mdBottomSheet, $mdDialog){

    $scope.currentPage = localStorageService.get('view') ? localStorageService.get('view') : localStorageService.set('view', 'about');
    console.log('view:', localStorageService.get('view'))
    console.log('currentPage:', $scope.currentPage)
    $scope.changePage = function(view){
        switch(view){
            case "home":
                localStorageService.set('view', 'home');
                $scope.currentPage = localStorageService.get('view');
                break;
            case "about":
                localStorageService.set('view', 'about');
                $scope.currentPage = localStorageService.get('view');
                break;
            case "projects":
                localStorageService.set('view', 'projects');
                $scope.currentPage = localStorageService.get('view');
                break;
            case "contact":
                localStorageService.set('view', 'contact');
                $scope.currentPage = localStorageService.get('view');
                break;
        }
        console.log($scope.currentPage)
    }
    $scope.activeView = function(view){
        if(localStorageService.get('view') == view) return 'active'
        }
    $scope.openBottomSheet = function(){
        $mdBottomSheet.show({
            template: '<md-bottom-sheet>' +
                      '<div class="container">' +
                       '<p class="flow-text center-align">' +
                       'JavaScript, Ruby, HTML5, CSS3, Rails, Sails.js, Angular JS, Express.js, Postgres, MongoDB, Sequelize, Active Record, jQuery, Git/GitHub, Heroku, Bootstrap, MaterializeCSS, Angular Material, Twilio, Bcrypt.' +
                       '</p>' +
                       '</div>' +
                       '</md-bottom-sheet>',
            controller: 'mainController'

        })
    }
    $scope.openDialog = function(){
        $mdDialog.show({
            template: '<md-dialog><md-card><md-card-content>here is th informations</md-card-content></md-card></md-dialog>',
            controller: 'otherController',
            clickOutsideToClose: true,
            escapeToClose: true
        })
    }


}])
angularApp.controller('otherController', ['$scope', function($scope){

}])
  </script>
</body>
</html>
